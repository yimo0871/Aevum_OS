services:
  # ── PostgreSQL with pgvector ──
  db:
    image: pgvector/pgvector:pg16
    container_name: aevum-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aevum}
      POSTGRES_USER: ${POSTGRES_USER:-aevum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aevum_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - aevum-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aevum}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: aevum-redis
    ports:
      - "6379:6379"
    volumes:
      - aevum-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aevum-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      DATABASE_URL: postgresql+asyncpg://aevum:aevum_dev_password@db:5432/aevum
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery Worker ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aevum-worker
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      DATABASE_URL: postgresql+asyncpg://aevum:aevum_dev_password@db:5432/aevum
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: celery -A app.celery_app worker --loglevel=info

  # ── Frontend (dev mode with hot reload) ──
  frontend:
    image: node:20-alpine
    container_name: aevum-frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: sh -c "npm install && npm run dev"

volumes:
  aevum-db-data:
  aevum-redis-data:
