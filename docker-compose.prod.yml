# Aevum（薪火）OS - 生产环境编排
# 使用：docker-compose -f docker-compose.prod.yml up -d

version: "3.9"

services:
  # ── Nginx 反向代理 ──
  nginx:
    image: nginx:alpine
    container_name: aevum-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always
    networks:
      - aevum-network

  # ── 后端 API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aevum-backend-prod
    command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000
    env_file:
      - .env
    environment:
      - ENVIRONMENT=production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - aevum-network
    expose:
      - "8000"

  # ── Celery Worker ──
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aevum-worker-prod
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=4
    env_file:
      - .env
    depends_on:
      - backend
      - redis
    restart: always
    networks:
      - aevum-network

  # ── 前端 ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost
    container_name: aevum-frontend-prod
    restart: always
    networks:
      - aevum-network
    expose:
      - "3000"

  # ── PostgreSQL + pgvector ──
  db:
    image: pgvector/pgvector:pg16
    container_name: aevum-db-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aevum}
      POSTGRES_USER: ${POSTGRES_USER:-aevum}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aevum_secure_2024}
    volumes:
      - aevum-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aevum}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - aevum-network

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: aevum-redis-prod
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - aevum-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - aevum-network

volumes:
  aevum-db-data:
  aevum-redis-data:

networks:
  aevum-network:
    driver: bridge
